name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment tarball
        run: |
          tar -czf alashed-backend-deploy.tar.gz \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=.git \
            --exclude=.github \
            .
          ls -lh alashed-backend-deploy.tar.gz

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Upload to S3
        run: |
          aws s3 cp alashed-backend-deploy.tar.gz \
            s3://alashed-media/deploy/alashed-backend-deploy.tar.gz
          echo "Uploaded to S3 successfully"

      - name: Generate presigned URL
        id: presign
        run: |
          PRESIGNED_URL=$(aws s3 presign \
            s3://alashed-media/deploy/alashed-backend-deploy.tar.gz \
            --expires-in 3600)
          echo "url=$PRESIGNED_URL" >> $GITHUB_OUTPUT
          echo "Generated presigned URL"

      - name: Deploy to EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids i-08eb56616ddb569bc \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'sudo -u ubuntu bash -c \"rm -rf /home/ubuntu/app\"',
              'sudo -u ubuntu bash -c \"cd /home/ubuntu && curl -o alashed-backend-deploy.tar.gz ${{ steps.presign.outputs.url }}\"',
              'sudo -u ubuntu bash -c \"cd /home/ubuntu && tar -xzf alashed-backend-deploy.tar.gz && mv alashed-biz-backend app 2>/dev/null || true\"',
              'sudo -u ubuntu bash -c \"test -d /home/ubuntu/app || (tar -xzf /home/ubuntu/alashed-backend-deploy.tar.gz -C /home/ubuntu && mv /home/ubuntu/alashed-biz-backend /home/ubuntu/app)\"',
              'sudo -u ubuntu bash -c \"cp /home/ubuntu/app.old/.env /home/ubuntu/app/.env 2>/dev/null || true\"',
              'sudo -u ubuntu bash -c \"cd /home/ubuntu/app && npm install --production\"',
              'sudo -u ubuntu bash -c \"cd /home/ubuntu/app && npm run build\"',
              'sudo -u ubuntu bash -c \"pm2 restart alashed-backend || pm2 start dist/server.js --name alashed-backend --time\"',
              'sudo -u ubuntu bash -c \"pm2 save\"',
              'echo Deployment completed'
            ]" \
            --region eu-north-1 \
            --query 'Command.CommandId' \
            --output text)

          echo "Command ID: $COMMAND_ID"
          echo "Waiting for deployment to complete..."
          sleep 60

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id i-08eb56616ddb569bc \
            --region eu-north-1 \
            --query 'StandardOutputContent' \
            --output text

      - name: Verify deployment
        run: |
          echo "Waiting for server to start..."
          sleep 10

          HEALTH_CHECK=$(aws ssm send-command \
            --instance-ids i-08eb56616ddb569bc \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["curl -s http://localhost:3000/health"]' \
            --region eu-north-1 \
            --query 'Command.CommandId' \
            --output text)

          sleep 5

          HEALTH_RESPONSE=$(aws ssm get-command-invocation \
            --command-id "$HEALTH_CHECK" \
            --instance-id i-08eb56616ddb569bc \
            --region eu-north-1 \
            --query 'StandardOutputContent' \
            --output text)

          echo "Health check response: $HEALTH_RESPONSE"

          if echo "$HEALTH_RESPONSE" | grep -q '"status":"ok"'; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed - health check did not return OK"
            exit 1
          fi

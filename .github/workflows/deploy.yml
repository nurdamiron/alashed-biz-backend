name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install all dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Sync to deployment directory
        run: |
          rsync -a --delete dist/       /home/ubuntu/alashed-biz/dist/
          rsync -a --delete migrations/ /home/ubuntu/alashed-biz/migrations/
          cp package.json package-lock.json /home/ubuntu/alashed-biz/

      - name: Install production dependencies
        working-directory: /home/ubuntu/alashed-biz
        run: npm ci --omit=dev

      - name: Run migrations
        working-directory: /home/ubuntu/alashed-biz
        run: node dist/scripts/migrate.js

      - name: Restart PM2
        run: HOME=/root pm2 restart alashed-biz && HOME=/root pm2 save

      - name: Health check
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed!"
            exit 1
          fi
          echo "Deploy successful!"

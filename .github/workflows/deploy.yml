name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Sync to deployment directory
        run: |
          rsync -rlptD --delete dist/       /home/ubuntu/alashed-biz/dist/
          rsync -rlptD --delete migrations/ /home/ubuntu/alashed-biz/migrations/
          cp package.json package-lock.json /home/ubuntu/alashed-biz/

      - name: Install production dependencies
        working-directory: /home/ubuntu/alashed-biz
        run: npm ci --omit=dev

      - name: Run migrations
        working-directory: /home/ubuntu/alashed-biz
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: node dist/scripts/migrate.js

      - name: Restart PM2
        run: |
          pm2 reload alashed-api --update-env 2>/dev/null || \
          (cd /home/ubuntu/alashed-biz && pm2 delete alashed-api 2>/dev/null || true && pm2 start ecosystem.config.cjs)
          pm2 save

      - name: Health check
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health)
          echo "Health check: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed!"
            exit 1
          fi
          echo "Deploy successful!"

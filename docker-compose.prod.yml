version: '3.8'

services:
  api:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
